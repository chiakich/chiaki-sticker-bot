server {
    listen 8080;
    server_name _;
    absolute_redirect off;

    # React static files
    location /webapp/static {
        alias /webapp/build/static;
    }
    location /webapp/edit {
        alias /webapp/build/;
        index index.html;
    }
    location /webapp/export {
        alias /webapp/build/;
        index index.html;
    }

    # Sticker data files
    location /webapp/data {
        alias /data/webapp;
    }

    # Proxy API to Go gin (pass full path including /webapp/api prefix)
    location /webapp/api {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram webhook
    location /webhook {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
    }

    # Health check for fly.io blue-green — handled directly by nginx
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
