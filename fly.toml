# fly.toml app configuration file generated for chiaki-sticker-bot on 2026-05-25T18:11:18+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chiaki-sticker-bot'
primary_region = 'sin'

[build]

[env]
  # Soft heap ceiling so Go returns memory to the OS promptly and leaves room for
  # the ~93MB VP9 ffmpeg subprocess + nginx within the 256MB VM (avoids OOM kills).
  GOMEMLIMIT = "128MiB"
  MSB_KAKAO_FAST_PIPE = "1"
  # Cap each heavy encoder (ffmpeg) at this % of one core via cpulimit, leaving
  # headroom so the webhook/health handler stays responsive during conversions.
  # `nice` alone can't prevent fly's platform-level throttling of the whole VM.
  # Lower this if replies still lag; raise it for faster (but greedier) encodes.
  MSB_CPU_LIMIT = "70"
  # Per-attempt ceiling for heavy conversions (ffmpeg/ImageMagick). On this
  # throttled shared-core VM a single VP9 encode can legitimately exceed the
  # 120s default, which made every attempt time out and retry forever.
  MSB_CONVERT_TIMEOUT_SECONDS = "300"
  MSB_IM_MEMORY_LIMIT = "32MiB"
  MSB_IM_MAP_LIMIT = "64MiB"
  MSB_IM_OOM_MEMORY_LIMIT = "24MiB"
  MSB_IM_OOM_MAP_LIMIT = "48MiB"

[deploy]
  strategy = "bluegreen"

kill_timeout = "320s"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  swap_size_mb = 256
