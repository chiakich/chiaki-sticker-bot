# fly.toml app configuration file generated for chiaki-sticker-bot on 2026-05-25T18:11:18+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chiaki-sticker-bot'
primary_region = 'sin'

[build]

[deploy]
  strategy = "bluegreen"

kill_timeout = "300s"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  swap_size_mb = 256
