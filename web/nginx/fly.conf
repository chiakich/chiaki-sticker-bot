server {
    listen 8080;
    server_name _;

    # React static files
    location /webapp/static {
        alias /webapp/build/static;
    }
    location /webapp/edit {
        alias /webapp/build;
        try_files $uri /webapp/build/index.html;
    }
    location /webapp/export {
        alias /webapp/build;
        try_files $uri /webapp/build/index.html;
    }

    # Sticker data files
    location /webapp/data {
        alias /data/webapp;
    }

    # Proxy API to Go gin
    location /webapp/api {
        proxy_pass http://127.0.0.1:8081/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
